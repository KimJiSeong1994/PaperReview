name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-dummy-key-for-ci
          JWT_SECRET: ci-test-secret-key-do-not-use-in-production
          APP_PASSWORD: ci-test-password
        run: pytest tests/ -v --tb=short --cov=routers --cov=app --cov=src --cov-report=term-missing --cov-fail-under=15

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/ --max-warnings 100 || echo "Lint warnings found (non-blocking)"

      - name: Run tests
        run: npm run test

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web-ui/dist
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: [backend, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Save last good deploy SHA
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' <<'SCRIPT'
          cd ~/PaperReviewAgent
          git rev-parse HEAD > /tmp/last_good_deploy.sha
          echo "Saved last good deploy SHA: $(cat /tmp/last_good_deploy.sha)"
          SCRIPT

      # Step 1: Git pull + pip install
      - name: Update code and dependencies
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' <<'SCRIPT'
          cd ~/PaperReviewAgent
          git fetch origin main
          git checkout -f main
          git reset --hard origin/main
          source venv/bin/activate
          pip install -r requirements.txt --quiet
          SCRIPT

      # Step 2: 프론트엔드 빌드 결과물을 tar로 압축하여 EC2에 전송
      - name: Upload frontend build
        run: |
          cd frontend-dist
          tar czf /tmp/frontend-dist.tar.gz .
          scp -i ~/.ssh/deploy_key /tmp/frontend-dist.tar.gz ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/frontend-dist.tar.gz
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' <<'SCRIPT'
          rm -rf ~/PaperReviewAgent/web-ui/dist
          mkdir -p ~/PaperReviewAgent/web-ui/dist
          tar xzf /tmp/frontend-dist.tar.gz -C ~/PaperReviewAgent/web-ui/dist
          rm /tmp/frontend-dist.tar.gz
          echo "Frontend upload done: $(ls ~/PaperReviewAgent/web-ui/dist/index.html)"
          SCRIPT

      # Step 2.5: Nginx 타임아웃 설정 (검색 파이프라인 120초+ 대응)
      - name: Configure nginx timeouts
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' <<'SCRIPT'
          # Add proxy timeout config if not already present
          NGINX_CONF="/etc/nginx/conf.d/proxy_timeouts.conf"
          if ! grep -q 'proxy_read_timeout' "$NGINX_CONF" 2>/dev/null; then
            echo 'proxy_read_timeout 180;' | sudo tee "$NGINX_CONF" > /dev/null
            echo 'proxy_send_timeout 180;' | sudo tee -a "$NGINX_CONF" > /dev/null
            echo 'proxy_connect_timeout 10;' | sudo tee -a "$NGINX_CONF" > /dev/null
            sudo nginx -t && sudo systemctl reload nginx
            echo "Nginx timeouts configured (180s)"
          else
            echo "Nginx timeouts already configured"
          fi
          SCRIPT

      # Step 3: 서버 재시작 + 헬스체크
      - name: Restart server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' <<'SCRIPT'
          sudo systemctl restart paperreview || {
            cd ~/PaperReviewAgent
            source venv/bin/activate
            pkill -f "uvicorn api_server:app" || true
            sleep 2
            setsid venv/bin/uvicorn api_server:app --host 0.0.0.0 --port 8000 --workers 2 > uvicorn.log 2>&1 &
            disown
          }
          sleep 4
          curl -sf http://localhost:8000/health > /dev/null && echo "Deploy successful!" || echo "Deploy failed!"
          SCRIPT

      - name: Rollback on health check failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} 'bash -s' <<'SCRIPT'
          cd ~/PaperReviewAgent
          LAST_SHA=$(cat /tmp/last_good_deploy.sha 2>/dev/null || echo "")
          if [ -z "$LAST_SHA" ]; then
            echo "No rollback SHA found, skipping rollback"
            exit 0
          fi
          echo "Rolling back to $LAST_SHA"
          git reset --hard "$LAST_SHA"
          source venv/bin/activate
          pip install -r requirements.txt --quiet
          sudo systemctl restart paperreview || {
            pkill -f "uvicorn api_server:app" || true
            sleep 2
            setsid venv/bin/uvicorn api_server:app --host 0.0.0.0 --port 8000 --workers 2 > uvicorn.log 2>&1 &
            disown
          }
          echo "Rollback complete"
          SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
