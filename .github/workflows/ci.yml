name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-dummy-key-for-ci
          JWT_SECRET: ci-test-secret-key-do-not-use-in-production
          APP_PASSWORD: ci-test-password
        run: pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t paper-review-agent:test .

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/PaperReviewAgent
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main

            # Backend dependencies
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Frontend build (t3.small 메모리 제한 대응)
            cd web-ui
            npm ci --silent
            NODE_OPTIONS="--max-old-space-size=1024" npm run build
            cd ..

            # Restart uvicorn
            pkill -f "uvicorn api_server:app" || true
            sleep 2
            nohup venv/bin/uvicorn api_server:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
            sleep 3

            # Health check
            curl -sf http://localhost:8000/docs > /dev/null && echo "Deploy successful!" || echo "Deploy failed!"
