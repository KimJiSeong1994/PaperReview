<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" style="width:100%;max-width:960px;height:auto" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="hero_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="hero_glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="url(#hero_bg)" rx="12"/>

  <!-- Subtle glow behind center -->
  <ellipse cx="480" cy="160" rx="300" ry="120" fill="url(#hero_glow)"/>

  <!-- Grid pattern (subtle) -->
  <g stroke="#1f2937" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="720" y1="0" x2="720" y2="320"/>
  </g>

  <!-- Left side: scattered paper nodes -->
  <g opacity="0.5">
    <!-- Paper nodes (small rounded rects representing papers) -->
    <rect x="60" y="70" width="80" height="24" rx="4" fill="none" stroke="#6b7280" stroke-width="1"/>
    <rect x="40" y="110" width="90" height="24" rx="4" fill="none" stroke="#6b7280" stroke-width="1"/>
    <rect x="70" y="150" width="75" height="24" rx="4" fill="none" stroke="#6b7280" stroke-width="1"/>
    <rect x="50" y="190" width="85" height="24" rx="4" fill="none" stroke="#6b7280" stroke-width="1"/>
    <rect x="65" y="230" width="70" height="24" rx="4" fill="none" stroke="#6b7280" stroke-width="1"/>

    <!-- Right side: organized results -->
    <rect x="810" y="80" width="100" height="24" rx="4" fill="none" stroke="#a5b4fc" stroke-width="1"/>
    <rect x="810" y="115" width="100" height="24" rx="4" fill="none" stroke="#a5b4fc" stroke-width="1"/>
    <rect x="810" y="150" width="100" height="24" rx="4" fill="none" stroke="#a5b4fc" stroke-width="1"/>
    <rect x="810" y="185" width="100" height="24" rx="4" fill="none" stroke="#a5b4fc" stroke-width="1.5"/>
    <rect x="810" y="220" width="100" height="24" rx="4" fill="none" stroke="#a5b4fc" stroke-width="1"/>

    <!-- Small dots inside paper nodes (text lines) -->
    <line x1="70" y1="80" x2="120" y2="80" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="50" y1="120" x2="110" y2="120" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="80" y1="160" x2="130" y2="160" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="60" y1="200" x2="115" y2="200" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="75" y1="240" x2="120" y2="240" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>

    <line x1="820" y1="90" x2="895" y2="90" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="820" y1="125" x2="895" y2="125" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="820" y1="160" x2="895" y2="160" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="820" y1="195" x2="895" y2="195" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
    <line x1="820" y1="230" x2="895" y2="230" stroke="#a5b4fc" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Connection lines: scattered → center → organized -->
  <g stroke="#6b7280" stroke-width="0.8" opacity="0.3">
    <line x1="140" y1="82" x2="340" y2="140"/>
    <line x1="130" y1="122" x2="340" y2="155"/>
    <line x1="145" y1="162" x2="340" y2="165"/>
    <line x1="135" y1="202" x2="340" y2="175"/>
    <line x1="135" y1="242" x2="340" y2="185"/>
  </g>
  <g stroke="#a5b4fc" stroke-width="0.8" opacity="0.3">
    <line x1="620" y1="140" x2="810" y2="92"/>
    <line x1="620" y1="155" x2="810" y2="127"/>
    <line x1="620" y1="165" x2="810" y2="162"/>
    <line x1="620" y1="175" x2="810" y2="197"/>
    <line x1="620" y1="185" x2="810" y2="232"/>
  </g>

  <!-- Center: Search Agent icon -->
  <circle cx="480" cy="135" r="48" fill="#181818" stroke="#a5b4fc" stroke-width="2"/>

  <!-- Magnifying glass icon inside circle -->
  <g transform="translate(480,135)" stroke="#a5b4fc" stroke-width="2.5" fill="none">
    <circle cx="-6" cy="-6" r="16"/>
    <line x1="6" y1="6" x2="16" y2="16" stroke-linecap="round"/>
  </g>

  <!-- Circular arrows around the icon (representing multi-turn) -->
  <g fill="none" stroke="#a5b4fc" stroke-width="1.5" opacity="0.6">
    <!-- Top arc -->
    <path d="M 452 95 A 40 40 0 0 1 508 95" stroke-dasharray="4 3"/>
    <!-- Bottom arc -->
    <path d="M 508 175 A 40 40 0 0 1 452 175" stroke-dasharray="4 3"/>
    <!-- Arrow tips -->
    <polygon points="508,93 514,95 508,97" fill="#a5b4fc"/>
    <polygon points="452,173 446,175 452,177" fill="#a5b4fc"/>
  </g>

  <!-- Title text -->
  <text x="480" y="215" text-anchor="middle" fill="#f3f4f6" font-size="22" font-weight="700" letter-spacing="-0.3">집현전 검색 에이전트</text>
  <text x="480" y="242" text-anchor="middle" fill="#9ca3af" font-size="14">단일 쿼리의 한계를 넘어서</text>

  <!-- Bottom labels -->
  <text x="100" y="285" text-anchor="middle" fill="#6b7280" font-size="11">산재된 논문</text>
  <text x="480" y="272" text-anchor="middle" fill="#a5b4fc" font-size="11">Multi-turn ReAct</text>
  <text x="860" y="285" text-anchor="middle" fill="#6b7280" font-size="11">정렬된 결과</text>

  <!-- Version badge -->
  <rect x="840" y="12" width="100" height="22" rx="11" fill="none" stroke="#1f2937" stroke-width="1"/>
  <text x="890" y="27" text-anchor="middle" fill="#6b7280" font-size="10">jiphyeonjeon.kr</text>
</svg>
