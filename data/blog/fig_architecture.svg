<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" style="width:100%;max-width:960px;height:auto" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arch_arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="280" fill="#0f0f0f" rx="12"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" fill="#f3f4f6" font-size="14" font-weight="700" letter-spacing="0.3">검색 에이전트 파이프라인 아키텍처</text>

  <!-- ===== ROW 1 (y=50): User Query, QueryAnalyzer, 6소스 병렬 검색, 4단계 중복 제거 ===== -->

  <!-- Node 1: User Query -->
  <rect x="24" y="50" width="148" height="62" rx="8" fill="#181818" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="98" y="76" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">User Query</text>
  <text x="98" y="95" text-anchor="middle" fill="#9ca3af" font-size="11">자연어 입력</text>

  <!-- Arrow 1→2 -->
  <line x1="172" y1="81" x2="196" y2="81" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arch_arrow)"/>

  <!-- Node 2: QueryAnalyzer -->
  <rect x="198" y="50" width="180" height="62" rx="8" fill="#181818" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="288" y="76" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">QueryAnalyzer</text>
  <text x="288" y="95" text-anchor="middle" fill="#9ca3af" font-size="11">Intent 분류 + 쿼리 개선</text>

  <!-- Arrow 2→3 -->
  <line x1="378" y1="81" x2="402" y2="81" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arch_arrow)"/>

  <!-- Node 3: 6소스 병렬 검색 -->
  <rect x="404" y="50" width="196" height="62" rx="8" fill="#181818" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="502" y="76" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">6소스 병렬 검색</text>
  <text x="502" y="95" text-anchor="middle" fill="#9ca3af" font-size="11">arXiv · Scholar · OpenAlex · DBLP</text>

  <!-- Arrow 3→4 -->
  <line x1="600" y1="81" x2="624" y2="81" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arch_arrow)"/>

  <!-- Node 4: 중복 제거 -->
  <rect x="626" y="50" width="180" height="62" rx="8" fill="#181818" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="716" y="76" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">중복 제거</text>
  <text x="716" y="95" text-anchor="middle" fill="#9ca3af" font-size="11">DOI · 제목 · Jaccard · 임베딩</text>

  <!-- Vertical arrow row1→row2 (right side down) -->
  <line x1="820" y1="112" x2="820" y2="148" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arch_arrow)"/>

  <!-- ===== ROW 2 (y=150): HybridRanker, ReAct Agent (highlighted), Rubric 평가, Results ===== -->

  <!-- Node 5: HybridRanker (right side, row 2 starts right→left) -->
  <rect x="626" y="150" width="180" height="62" rx="8" fill="#181818" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="716" y="176" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">HybridRanker</text>
  <text x="716" y="195" text-anchor="middle" fill="#9ca3af" font-size="11">BM25 + Semantic + RRF</text>

  <!-- Arrow 5→6 -->
  <line x1="626" y1="181" x2="602" y2="181" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arch_arrow)"/>

  <!-- Node 6: ReAct Agent (highlighted with indigo border) -->
  <rect x="404" y="150" width="196" height="62" rx="8" fill="#181818" stroke="#a5b4fc" stroke-width="2"/>
  <text x="502" y="176" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">ReAct Agent</text>
  <text x="502" y="195" text-anchor="middle" fill="#9ca3af" font-size="11">멀티턴 반복 검색 (예산 기반)</text>

  <!-- Arrow 6→7 -->
  <line x1="404" y1="181" x2="380" y2="181" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arch_arrow)"/>

  <!-- Node 7: Rubric 평가 -->
  <rect x="198" y="150" width="180" height="62" rx="8" fill="#181818" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="288" y="176" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">Rubric 평가</text>
  <text x="288" y="195" text-anchor="middle" fill="#9ca3af" font-size="11">Diversity · Thoroughness · 등</text>

  <!-- Arrow 7→8 -->
  <line x1="198" y1="181" x2="174" y2="181" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arch_arrow)"/>

  <!-- Node 8: Results -->
  <rect x="24" y="150" width="148" height="62" rx="8" fill="#181818" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="98" y="176" text-anchor="middle" fill="#f3f4f6" font-size="13" font-weight="700">Results</text>
  <text x="98" y="195" text-anchor="middle" fill="#9ca3af" font-size="11">최종 순위 논문</text>

  <!-- ===== Row direction labels ===== -->
  <text x="395" y="44" text-anchor="middle" fill="#6b7280" font-size="9" letter-spacing="1">FORWARD PASS (좌 → 우)</text>
  <text x="395" y="248" text-anchor="middle" fill="#6b7280" font-size="9" letter-spacing="1">EVALUATION (우 → 좌)</text>

  <!-- Divider line -->
  <line x1="24" y1="140" x2="820" y2="140" stroke="#1f2937" stroke-width="1"/>

  <!-- Footer note -->
  <text x="480" y="265" text-anchor="middle" fill="#6b7280" font-size="9.5">ReAct Agent 강조 = 현재 핵심 처리 단계 · 집현전 (Jiphyeonjeon) Search Agent v2.0</text>
</svg>
