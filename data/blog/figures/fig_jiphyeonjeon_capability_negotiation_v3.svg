<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/></marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
    <style>
      .title { font: 800 32px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .h { font: 800 23px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .h2 { font: 800 19px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .b { font: 600 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .s { font: 500 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #4b5563; }
      .tiny { font: 600 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #4b5563; }
      .mono { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
      .chip { font: 700 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#f7f1e8"/>
  <text x="60" y="58" class="title">Capability negotiation: expose only supported tools</text>
<rect x="70" y="130" width="230" height="95" rx="18" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="88" y="163" class="h2">1. Host starts Agent</text>
<text x="88" y="188" class="s">MCP host launches adapter</text>
<rect x="360" y="130" width="260" height="95" rx="18" fill="#dbeafe" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="378" y="163" class="h2">2. GET /api/version</text>
<text x="378" y="188" class="s">request server capabilities</text>
<rect x="700" y="105" width="360" height="145" rx="18" fill="#fef3c7" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="718" y="138" class="h2">3. Server response</text>
<text x="718" y="163" class="s">version · mcp_min_client · capabilities[]</text>
<rect x="724" y="186" width="72" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="760.0" y="205" class="chip" text-anchor="middle">search</text>
<rect x="806" y="186" width="74" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="843.0" y="205" class="chip" text-anchor="middle">papers</text>
<rect x="890" y="186" width="102" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="941.0" y="205" class="chip" text-anchor="middle">bookmarks</text>
<rect x="1002" y="186" width="190" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="1097.0" y="205" class="chip" text-anchor="middle">+ deep_review · blog · ...</text>
<rect x="1135" y="130" width="300" height="95" rx="18" fill="#ffe4e6" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="1153" y="163" class="h2">Unavailable branch</text>
<text x="1153" y="188" class="s">404 / timeout / old server</text>
<rect x="165" y="420" width="330" height="130" rx="18" fill="#fed7aa" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="183" y="453" class="h2">4. Filter capabilities</text>
<text x="183" y="478" class="s">server list × client tool set</text>
<text x="188" y="500" class="tiny">coarse availability only</text>
<rect x="600" y="400" width="360" height="170" rx="18" fill="#dcfce7" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="618" y="433" class="h2">5. Register tools</text>
<text x="618" y="458" class="s">available tools only · example subset</text>
<rect x="625" y="486" width="72" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="661.0" y="505" class="chip" text-anchor="middle">search</text>
<rect x="707" y="486" width="74" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="744.0" y="505" class="chip" text-anchor="middle">papers</text>
<rect x="791" y="486" width="102" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="842.0" y="505" class="chip" text-anchor="middle">bookmarks</text>
<rect x="904" y="486" width="150" height="28" rx="14" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="979.0" y="505" class="chip" text-anchor="middle">recommendations</text>
<rect x="1085" y="420" width="330" height="130" rx="18" fill="#ede9fe" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="1103" y="453" class="h2">Fallback baseline</text>
<text x="1103" y="478" class="s">public/read-only minimum</text>
<text x="1108" y="500" class="tiny">e.g. search/papers only unless auth+schema known</text>
<path d="M 300 178 L 360 178" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="285.0" y="156.0" width="90" height="30" rx="15" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="330.0" y="176.0" class="tiny" text-anchor="middle">start</text>
<path d="M 620 178 L 700 178" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="615.0" y="156.0" width="90" height="30" rx="15" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="660.0" y="176.0" class="tiny" text-anchor="middle">request</text>
<path d="M 1060 178 L 1135 178" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-dasharray="9 8" marker-end="url(#arrow)"/>
<rect x="1035.5" y="156.0" width="124" height="30" rx="15" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="1097.5" y="176.0" class="tiny" text-anchor="middle">if unavailable</text>
<path d="M 880 250 L 880 330 L 330 330 L 330 420" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="268.0" y="308" width="124" height="30" rx="15" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="330" y="328" class="tiny" text-anchor="middle">capabilities[]</text>
<path d="M 495 485 L 600 485" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="502.5" y="463.0" width="90" height="30" rx="15" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="547.5" y="483.0" class="tiny" text-anchor="middle">register</text>
<path d="M 1290 225 L 1290 420" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="9 8" marker-end="url(#arrow)"/>
<rect x="1231.5" y="398" width="117" height="30" rx="15" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="1290" y="418" class="tiny" text-anchor="middle">safe fallback</text>
<rect x="120" y="675" width="1360" height="115" rx="22" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2"/>
<text x="150" y="718" class="h2">Design guardrail / 설계 안전장치</text>
<text x="150" y="752" class="b">Agents should not expose tools the server cannot run. / 서버가 실행할 수 없는 도구는 모델에게 보이지 않게 한다.</text>
<text x="150" y="782" class="s">Not included yet: tool schema delivery, auth scope negotiation, or hard version enforcement.</text>
</svg>
