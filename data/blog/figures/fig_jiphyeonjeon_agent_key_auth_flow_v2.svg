<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 32px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .h { font: 700 25px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .b { font: 500 19px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .s { font: 500 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #4b5563; }
      .tiny { font: 500 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #4b5563; }
      .mono { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
      .chip { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#f7f1e8"/>

<text x="60" y="58" class="title">Agent Key authentication flow: explicit token handoff</text>
<rect x="65" y="150" width="180" height="135" rx="24" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="89" y="192" class="h">Login</text>
<text x="89" y="224" class="s">user session</text>
<rect x="285" y="150" width="185" height="135" rx="24" fill="#dbeafe" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="309" y="192" class="h">My Page</text>
<text x="309" y="224" class="s">Agent Key button</text>
<rect x="510" y="150" width="190" height="135" rx="24" fill="#fef3c7" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="534" y="192" class="h">Click</text>
<text x="534" y="224" class="s">copy action</text>
<rect x="740" y="150" width="230" height="135" rx="24" fill="#fed7aa" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="764" y="192" class="h">access_token</text>
<text x="764" y="224" class="s">login JWT</text>
<text x="764" y="248" class="s">no logging</text>
<rect x="1010" y="150" width="230" height="135" rx="24" fill="#ede9fe" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="1034" y="192" class="h">MCP host env</text>
<text x="1034" y="224" class="s">paste manually</text>
<rect x="1280" y="150" width="250" height="135" rx="24" fill="#dcfce7" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="1304" y="192" class="h">API calls</text>
<text x="1304" y="224" class="s">Bearer token</text>
<path d="M 245 218 L 285 218" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 470 218 L 510 218" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 700 218 L 740 218" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 970 218 L 1010 218" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<path d="M 1240 218 L 1280 218" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="220" y="365" width="1160" height="72" rx="22" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
<text x="250" y="410" class="b">Current implementation: login JWT transfer — not a dedicated scoped API key yet</text>
<rect x="180" y="515" width="560" height="240" rx="24" fill="#fff7ed" stroke="#fdba74" stroke-width="2" filter="url(#shadow)"/>
<text x="220" y="565" class="h">Current Agent Key</text>
<text x="230" y="610" class="b">• current login token</text>
<text x="230" y="644" class="b">• lifetime follows session/token policy</text>
<text x="230" y="678" class="b">• explicit copy/paste</text>
<text x="230" y="712" class="b">• no scope / revoke / audit yet</text>
<rect x="860" y="515" width="560" height="240" rx="24" fill="#eef2ff" stroke="#a5b4fc" stroke-width="2" filter="url(#shadow)"/>
<text x="900" y="565" class="h">Future Agent Token</text>
<text x="910" y="610" class="b">• separate issuance</text>
<text x="910" y="644" class="b">• per-client scopes</text>
<text x="910" y="678" class="b">• revoke UI</text>
<text x="910" y="712" class="b">• audit log and rate limits</text>
</svg>
