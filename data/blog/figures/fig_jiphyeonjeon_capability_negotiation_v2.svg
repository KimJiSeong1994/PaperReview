<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 32px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .h { font: 700 25px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .b { font: 500 19px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
      .s { font: 500 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #4b5563; }
      .tiny { font: 500 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #4b5563; }
      .mono { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
      .chip { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', Arial, sans-serif; fill: #111827; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="#f7f1e8"/>

<text x="60" y="58" class="title">Capability negotiation: register only what server supports</text>
<rect x="95" y="140" width="300" height="145" rx="24" fill="#f3f4f6" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="119" y="182" class="h">1. Host starts Agent</text>
<text x="119" y="214" class="s">MCP host launches adapter</text>
<rect x="500" y="140" width="300" height="145" rx="24" fill="#dbeafe" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="524" y="182" class="h">2. GET /api/version</text>
<text x="524" y="214" class="s">Agent asks API server</text>
<rect x="905" y="120" width="420" height="185" rx="24" fill="#fef3c7" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="929" y="162" class="h">3. Server response</text>
<text x="929" y="194" class="s">version, mcp_min_client</text>
<text x="929" y="218" class="s">capabilities[]</text>
<rect x="929" y="250" width="72" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="965.0" y="270" class="chip" text-anchor="middle">search</text>
<rect x="1011" y="250" width="72" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="1047.0" y="270" class="chip" text-anchor="middle">papers</text>
<rect x="1093" y="250" width="96" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="1141.0" y="270" class="chip" text-anchor="middle">bookmarks</text>
<rect x="929" y="290" width="144" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="1001.0" y="310" class="chip" text-anchor="middle">recommendations</text>
<rect x="230" y="475" width="390" height="175" rx="24" fill="#fed7aa" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="254" y="517" class="h">4. Filter capabilities</text>
<text x="254" y="549" class="s">server list × client tool set</text>
<rect x="254" y="581" width="112" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="310.0" y="601" class="chip" text-anchor="middle">coarse flag</text>
<rect x="735" y="465" width="360" height="195" rx="24" fill="#dcfce7" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="759" y="507" class="h">5. Register tools</text>
<text x="759" y="539" class="s">available tools only</text>
<rect x="759" y="571" width="72" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="795.0" y="591" class="chip" text-anchor="middle">search</text>
<rect x="841" y="571" width="72" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="877.0" y="591" class="chip" text-anchor="middle">papers</text>
<rect x="923" y="571" width="96" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="971.0" y="591" class="chip" text-anchor="middle">bookmarks</text>
<rect x="759" y="611" width="144" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="831.0" y="631" class="chip" text-anchor="middle">recommendations</text>
<rect x="1190" y="485" width="290" height="155" rx="24" fill="#ede9fe" stroke="#6b7280" stroke-width="2" filter="url(#shadow)"/>
<text x="1214" y="527" class="h">Fallback baseline</text>
<text x="1214" y="559" class="s">if /api/version unavailable</text>
<rect x="1214" y="591" width="120" height="30" rx="15" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/>
<text x="1274.0" y="611" class="chip" text-anchor="middle">safe minimum</text>
<path d="M 395 212 L 500 212" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="352.5" y="188.0" width="190" height="34" rx="17" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="447.5" y="210.0" class="tiny" text-anchor="middle">start</text>
<path d="M 800 212 L 905 212" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="757.5" y="188.0" width="190" height="34" rx="17" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="852.5" y="210.0" class="tiny" text-anchor="middle">request</text>
<path d="M 1115 305 L 1115 390 L 425 390 L 425 475" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
<rect x="310" y="366" width="230" height="34" rx="17" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="425" y="388" class="tiny" text-anchor="middle">capabilities[]</text>
<path d="M 620 565 L 735 565" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="582.5" y="541.0" width="190" height="34" rx="17" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="677.5" y="563.0" class="tiny" text-anchor="middle">register</text>
<path d="M 1095 565 L 1190 565" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" stroke-dasharray="10 8"/>
<rect x="1047.5" y="541.0" width="190" height="34" rx="17" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<text x="1142.5" y="563.0" class="tiny" text-anchor="middle">fallback</text>
<rect x="130" y="770" width="1340" height="60" rx="20" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
<text x="154" y="806" class="b">Why it matters: agents should not expose tools the server cannot run.</text>
</svg>
